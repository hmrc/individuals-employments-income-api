components:
  parameters:
    source:
      in: query
      name: source
      description: |
        Specifies the source of data to be returned.
      schema:
        type: string
        enum: [ user, hmrc-held ]
        example: hmrc-held
      required: false
    savingsAccountId:
      in: query
      name: savingsAccountId
      description: The unique identifier of a savings account.
      schema:
        type: string
        pattern: ^[A-Za-z0-9]{15}$
        example: SAVKB2UVwUTBQGJ
      required: false